<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You have been invited</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f4f5; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; color: #18181b; margin: 0 0 8px; }
    .header p { color: #71717a; margin: 0; }
    .button { display: inline-block; background-color: #18181b; color: #ffffff !important; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 500; }
    .footer { margin-top: 32px; text-align: center; color: #a1a1aa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>You've been invited</h1>
      <p>You have been invited to join Restoloop.</p>
    </div>
    <p style="color: #52525b; line-height: 1.6;">
      Click the button below to accept the invitation and set up your account.
    </p>
    <div style="text-align: center; margin: 32px 0;">
      <a href="{{ .ConfirmationURL }}" class="button">Accept Invitation</a>
    </div>
    <div class="footer">
      <p>If you didn't expect this invitation, you can safely ignore this email.</p>
    </div>
  </div>
</body>
</html>
